  .hero.gone{opacity:0;pointer-events:none;position:absolute;inset:0;}
  /* soft scrim only along the bottom, so the photo's own text up top stays untouched */
  .hero::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(to top,
      rgba(9,24,46,.50) 0%, rgba(9,24,46,.16) 30%, rgba(9,24,46,0) 55%);
  }

  .hero-inner{
    position:relative;z-index:2;
    width:100%;max-width:1200px;margin:0 auto;
    padding:0 clamp(20px,5vw,72px) clamp(30px,6vh,58px);
  }

  /* frosted card — clearly separated from the photo's headline */
  .gift-card{
    display:inline-flex;align-items:center;gap:30px;
    background:rgba(12,28,54,.52);
    backdrop-filter:blur(16px) saturate(150%);
    -webkit-backdrop-filter:blur(16px) saturate(150%);
    border:1px solid rgba(255,255,255,.18);
    border-radius:24px;
    padding:28px 34px;
    box-shadow:0 26px 64px rgba(7,20,42,.42);
  }
  .gift-card .copy{max-width:18ch;}
  .gift-card h1{
    color:#fff;font-weight:300;
    font-size:clamp(1.9rem,4.6vw,2.9rem);
    line-height:1;letter-spacing:-.02em;
    margin-bottom:10px;
  }
  .gift-card h1 b{font-weight:800;}
  .gift-card .hint{
    color:rgba(255,255,255,.82);
    font-weight:500;font-size:.95rem;line-height:1.45;
  }

  /* ---- gift box (size driven by --s) ---- */
  .gift-wrap{
    --s:.86;
    cursor:pointer;flex:none;
    width:calc(190px * var(--s));
    height:calc(200px * var(--s));
    position:relative;
    filter:drop-shadow(0 22px 28px rgba(7,20,42,.5));
    animation:float 4.6s ease-in-out infinite;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  }
  .gift-wrap:hover{transform:scale(1.06);}
  .gift-wrap:active{transform:scale(.97);}
  @keyframes float{
    0%,100%{transform:translateY(0) rotate(-1deg);}
    50%{transform:translateY(-11px) rotate(1deg);}
  }
  .gift-wrap::after{
    content:"";position:absolute;left:50%;top:54%;
    width:220px;height:220px;transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(255,255,255,.32) 0%, rgba(255,255,255,0) 64%);
    z-index:-1;
  }
  .gift-box{
    position:absolute;top:0;left:0;
    width:190px;height:200px;
    transform-origin:top left;
    transform:scale(var(--s));
  }
  .box-base{
    position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:162px;height:122px;
    background:linear-gradient(160deg,#ffffff 0%,#EAF0F7 60%,#D8E2EE 100%);
    border-radius:5px 5px 7px 7px;
  }
  .box-base::before{
    content:"";position:absolute;left:50%;top:0;transform:translateX(-50%);
    width:32px;height:100%;
    background:linear-gradient(90deg,rgba(255,255,255,.15),var(--mint) 24%,#76d3c2 50%,var(--mint) 76%,rgba(255,255,255,.15));
  }
  .box-lid{
    position:absolute;top:32px;left:50%;transform:translateX(-50%);
    width:182px;height:46px;
    background:linear-gradient(160deg,#ffffff 0%,#EFF4F9 60%,#DEE7F1 100%);
    border-radius:6px;z-index:3;
    transform-origin:center bottom;
    transition:transform 1s cubic-bezier(.5,-.4,.3,1.4),opacity .9s ease;
  }
  .box-lid::before{
    content:"";position:absolute;left:50%;top:0;transform:translateX(-50%);
    width:32px;height:100%;
    background:linear-gradient(90deg,rgba(255,255,255,.15),var(--mint) 24%,#76d3c2 50%,var(--mint) 76%,rgba(255,255,255,.15));
  }
  .bow{
    position:absolute;top:6px;left:50%;transform:translateX(-50%);
    width:72px;height:44px;z-index:4;
    transition:transform 1s cubic-bezier(.5,-.4,.3,1.4),opacity .7s ease;
  }
  .bow span{
    position:absolute;top:4px;width:36px;height:36px;
    border:9px solid var(--mint);border-radius:50% 50% 50% 0;
  }
  .bow .l{left:0;transform:rotate(45deg);}
  .bow .r{right:0;transform:rotate(-45deg) scaleX(-1);}
  .bow .knot{
    width:16px;height:16px;left:50%;top:13px;transform:translateX(-50%);
    background:#76d3c2;border-radius:50%;border:none;
  }
  .gift-wrap.open{animation:none;cursor:default;}
  .gift-wrap.open .box-lid{transform:translateX(-50%) translateY(-150px) rotate(24deg);opacity:0;}
  .gift-wrap.open .bow{transform:translateX(-50%) translateY(-180px) rotate(40deg) scale(.7);opacity:0;}
  .gift-wrap.open .box-base{animation:settle .7s ease forwards;}
  @keyframes settle{
    40%{transform:translateX(-50%) scaleY(1.08) scaleX(.96);}
    100%{transform:translateX(-50%) scaleY(1) scaleX(1);}
  }

  /* ============ REVEAL ============ */
  .reveal{
    display:none;
    min-height:100vh;min-height:100dvh;
    background:radial-gradient(120% 80% at 50% 0%, #FFFFFF 0%, var(--paper) 55%, #E5EDF6 100%);
    align-items:center;justify-content:center;
    padding:64px 26px 80px;
  }
  .reveal.show{display:flex;}
  .reveal-inner{
    display:flex;flex-direction:column;align-items:center;text-align:center;
    max-width:440px;width:100%;
  }
  .kicker{
    font-weight:700;font-size:.74rem;letter-spacing:.32em;
    text-transform:uppercase;color:var(--blue);
    margin-bottom:10px;padding-left:.32em;
    opacity:0;animation:rise .8s ease .15s forwards;
  }
  .reveal h2{
    font-weight:300;font-size:clamp(2rem,7vw,3rem);
    line-height:1.04;letter-spacing:-.02em;margin-bottom:30px;
    opacity:0;animation:rise .8s ease .28s forwards;
  }
  .reveal h2 b{font-weight:800;}
  .cert-frame{
    position:relative;background:#fff;padding:13px;border-radius:4px;
    box-shadow:0 2px 4px rgba(20,40,70,.08),0 20px 44px rgba(20,40,70,.18),0 44px 90px rgba(20,40,70,.12);
    width:100%;
    opacity:0;transform:translateY(40px) scale(.94);
    animation:cardIn 1s cubic-bezier(.2,.7,.25,1) .4s forwards;
  }
  .cert-frame::before{
    content:"";position:absolute;inset:7px;
    border:1px solid rgba(27,111,208,.22);pointer-events:none;border-radius:2px;
  }
  .cert-frame img{display:block;width:100%;height:auto;border-radius:2px;}
  .seal{
    position:absolute;right:-18px;bottom:-18px;
    width:80px;height:80px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%,#3D9AE8,var(--blue-deep) 72%);
    color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;
    font-weight:700;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;line-height:1.4;
    box-shadow:0 10px 22px rgba(14,60,140,.4);
    border:2px dashed rgba(255,255,255,.5);
    opacity:0;transform:scale(0) rotate(-40deg);
    animation:sealIn .7s cubic-bezier(.34,1.56,.64,1) 1.15s forwards;
  }
  @keyframes sealIn{to{opacity:1;transform:scale(1) rotate(-12deg);}}
  .actions{
    margin-top:38px;display:flex;flex-direction:column;align-items:center;gap:16px;
    opacity:0;animation:rise .8s ease 1s forwards;
  }
  .btn{
    font-family:inherit;font-weight:700;font-size:.92rem;letter-spacing:.06em;color:#fff;
    background:linear-gradient(160deg,var(--blue),var(--blue-deep));
    border:none;border-radius:40px;padding:17px 42px;
    cursor:pointer;text-decoration:none;display:inline-block;
    box-shadow:0 12px 28px rgba(14,60,140,.32);
    transition:transform .25s ease,box-shadow .25s ease;
  }
  .btn:hover{transform:translateY(-3px);box-shadow:0 18px 36px rgba(14,60,140,.4);}
  .btn:active{transform:translateY(-1px);}
  .note{font-weight:400;font-size:.98rem;color:#5A6B7D;}

  @keyframes rise{to{opacity:1;transform:translateY(0);}}
  @keyframes cardIn{to{opacity:1;transform:translateY(0) scale(1);}}

  /* confetti */
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:9;overflow:hidden;}
  .confetti i{
    position:absolute;top:-12vh;width:9px;height:13px;border-radius:1px;
    opacity:.95;animation:fall linear forwards;
  }
  @keyframes fall{to{transform:translateY(120vh) rotate(720deg);opacity:0;}}

document.getElementById('certImg').src = CERT_DATA;
document.getElementById('downloadBtn').href = CERT_DATA;

const gift   = document.getElementById('gift');
const hero   = document.getElementById('hero');
const reveal = document.getElementById('reveal');
let opened = false;

function burstConfetti(){
  const colors = ['#1B6FD0','#5BC2AE','#76d3c2','#ffffff','#3DA694','#9CC9F0'];
  const layer = document.createElement('div');
  layer.className = 'confetti';
  document.body.appendChild(layer);
  for(let i=0;i<74;i++){
    const c = document.createElement('i');
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (2.6 + Math.random()*2.2) + 's';
    c.style.animationDelay = (Math.random()*0.5) + 's';
    const w = 6 + Math.random()*8;
    c.style.width = w + 'px';
    c.style.height = (w*1.4) + 'px';
    if(Math.random()>0.6) c.style.borderRadius='50%';
    layer.appendChild(c);
  }
  setTimeout(()=>layer.remove(), 5400);
}

function openGift(){
  if(opened) return;
  opened = true;
  gift.classList.add('open');
  burstConfetti();
  setTimeout(()=>{
    hero.classList.add('gone');
    reveal.classList.add('show');
    window.scrollTo({top:0,behavior:'smooth'});
  }, 950);
}

gift.addEventListener('click', openGift);
gift.addEventListener('keydown', e=>{
  if(e.key==='Enter' || e.key===' '){ e.preventDefault(); openGift(); }
});
</script>
